name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # Gate the whole release on the tag and every version-bearing manifest
  # agreeing. Tauri names the bundle assets from the app version in the
  # manifests (NOT the git tag), so a stale manifest silently ships assets
  # named for the wrong version. Fail fast, once, before spinning up the
  # per-platform build matrix. Skipped on manual workflow_dispatch (no tag).
  verify-version:
    name: Verify version matches tag
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'
    steps:
      - uses: actions/checkout@v4
      - name: Check manifest versions match the tag
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME#v}"
          echo "Tag version: $tag"

          tauri=$(jq -r '.version' apps/desktop/src-tauri/tauri.conf.json)
          root_pkg=$(jq -r '.version' package.json)
          desktop_pkg=$(jq -r '.version' apps/desktop/package.json)
          cargo=$(grep -m1 '^version = ' apps/desktop/src-tauri/Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')

          fail=0
          check() {
            local name="$1" ver="$2"
            printf '%-32s %s\n' "$name" "$ver"
            if [ "$ver" != "$tag" ]; then
              echo "::error::$name version ($ver) does not match tag ($tag)"
              fail=1
            fi
          }
          check "apps/desktop/src-tauri/tauri.conf.json" "$tauri"
          check "package.json"                           "$root_pkg"
          check "apps/desktop/package.json"              "$desktop_pkg"
          check "apps/desktop/src-tauri/Cargo.toml"      "$cargo"

          if [ "$fail" -ne 0 ]; then
            echo "Version mismatch: bump every manifest to match the tag ($tag) before publishing."
            exit 1
          fi
          echo "All versions match $tag"

  release:
    # Run only if the version check passed (tag push) or was skipped
    # (manual workflow_dispatch, where there is no tag to compare against).
    needs: verify-version
    if: always() && (needs.verify-version.result == 'success' || needs.verify-version.result == 'skipped')
    permissions:
      contents: write
    strategy:
      # A release needs every platform's asset, so a single failure makes the
      # whole release un-shippable and we re-run all of it anyway. Cancel the
      # in-flight siblings on first failure rather than pay for doomed minutes.
      fail-fast: true
      matrix:
        # Build each target NATIVELY (no --target cross-compile). The backend
        # sidecar (scripts/build-sidecar.mjs) is compiled for the runner's host
        # triple only, so the runner arch must match the bundle arch. That's why
        # the two macOS arches use separate runners instead of one with --target.
        include:
          - platform: 'macos-latest'   # Apple silicon (aarch64-apple-darwin)
          - platform: 'macos-15-intel' # Intel (x86_64-apple-darwin); macos-13 was retired Dec 2025
          - platform: 'ubuntu-22.04'   # x86_64-unknown-linux-gnu
          - platform: 'windows-latest' # x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      # Node is used to run scripts/build-sidecar.mjs (the bun-compile driver).
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      # Bun is the package manager AND compiles the backend into the sidecar.
      # build-sidecar.mjs enforces bun >= 1.3.14 (older versions crash the
      # process on the k8s websocket teardown).
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install workspace dependencies
        run: bun install

      # tauri-action runs `tauri build` inside apps/desktop. That triggers the
      # beforeBuildCommand in tauri.conf.json, which builds the frontend and
      # compiles the sidecar before bundling.
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.ref_name }}
          releaseName: 'k9s Dashboard ${{ github.ref_name }}'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: true
          prerelease: false
