name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref (e.g. force-pushes to a PR).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Type-check and build the SolidJS frontend and the Fastify backend.
  web:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install workspace dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck frontend
        run: bun run --filter k9s-dashboard-frontend typecheck

      - name: Build frontend
        run: bun run --filter k9s-dashboard-frontend build

      - name: Typecheck backend
        run: bun run --filter k9s-dashboard-backend typecheck

      - name: Build backend
        run: bun run --filter k9s-dashboard-backend build

  # Format-check and clippy the Tauri desktop crate.
  rust:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      # Node runs scripts/build-sidecar.mjs; Bun installs deps + compiles the sidecar.
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust stable (clippy + rustfmt)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install workspace dependencies
        run: bun install --frozen-lockfile

      # The Tauri crate embeds the frontend dist and resolves the sidecar
      # (externalBin) at compile time, so both must exist before fmt/clippy.
      - name: Build frontend + sidecar
        run: bun run desktop:prebuild

      - name: cargo fmt --check
        working-directory: apps/desktop/src-tauri
        run: cargo fmt --all -- --check

      - name: cargo clippy
        working-directory: apps/desktop/src-tauri
        run: cargo clippy --all-targets -- -D warnings
