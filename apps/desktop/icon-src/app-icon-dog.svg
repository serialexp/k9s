<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <g transform="translate(96,96) scale(0.8125)">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3B7DEB"/>
      <stop offset="1" stop-color="#2150B0"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <!-- specular highlight along the top-left bezel -->
    <linearGradient id="specular" x1="0%" y1="0%" x2="50%" y2="50%">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <!-- specular highlight along the bottom-right bezel -->
    <linearGradient id="specular2" x1="100%" y1="100%" x2="50%" y2="50%">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <!-- soft drop shadow into the icon-grid margin -->
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="10" stdDeviation="9" flood-color="#0b1f47" flood-opacity="0.34"/>
    </filter>
    <clipPath id="squircle">
      <rect x="0" y="0" width="1024" height="1024" rx="232" ry="232"/>
    </clipPath>
  </defs>
  <rect x="0" y="0" width="1024" height="1024" rx="232" ry="232" fill="url(#bg)" filter="url(#shadow)"/>
  <rect x="0" y="0" width="1024" height="1024" rx="232" ry="232" fill="url(#sheen)"/>
  <path d="M748 0 L232 0 A232 232 0 0 0 0 232 L0 748" fill="none" stroke="url(#specular)" stroke-width="9" stroke-linecap="round" clip-path="url(#squircle)"/>
  <path d="M276 1024 L792 1024 A232 232 0 0 0 1024 792 L1024 276" fill="none" stroke="url(#specular2)" stroke-width="9" stroke-linecap="round" clip-path="url(#squircle)"/>
  <g>
    <!-- ears -->
    <path d="M352 360 C300 250 318 196 372 214 C420 232 452 300 470 352 Z" fill="#ffffff"/>
    <path d="M672 360 C724 250 706 196 652 214 C604 232 572 300 554 352 Z" fill="#ffffff"/>
    <!-- head -->
    <path d="M512 322
             C636 322 706 404 706 520
             C706 470 706 600 660 672
             C616 740 566 772 512 772
             C458 772 408 740 364 672
             C318 600 318 470 318 520
             C318 404 388 322 512 322 Z" fill="#ffffff"/>
    <!-- snout -->
    <ellipse cx="512" cy="650" rx="118" ry="98" fill="#E6EEFC"/>
    <!-- eyes -->
    <ellipse cx="438" cy="520" rx="30" ry="36" fill="#23489A"/>
    <ellipse cx="586" cy="520" rx="30" ry="36" fill="#23489A"/>
    <!-- nose -->
    <ellipse cx="512" cy="612" rx="46" ry="36" fill="#23489A"/>
    <!-- mouth -->
    <path d="M512 648 L512 690 M512 690 C512 724 482 736 458 724
             M512 690 C512 724 542 736 566 724"
          fill="none" stroke="#23489A" stroke-width="14" stroke-linecap="round"/>
  </g>
  </g>
</svg>